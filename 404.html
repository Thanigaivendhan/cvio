<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - CVio</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#eef2ff;color:#0f172a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
.logo-box{width:48px;height:48px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;margin:0 auto 1rem;box-shadow:0 4px 16px rgba(37,99,235,.3)}
h1{font-family:'Fraunces',serif;font-size:5rem;font-weight:600;color:#2563eb;line-height:1}
h2{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;margin:1rem 0 0.5rem;color:#0f172a}
p{font-size:15px;color:#64748b;margin-bottom:2rem;max-width:400px}
.btn{display:inline-block;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:12px 32px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 16px rgba(37,99,235,.35);transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(37,99,235,.45)}
</style>
</head>
<body>
  <div class="logo-box">CV</div>
  <h1>404</h1>
  <h2>Page not found</h2>
  <p>The page you're looking for doesn't exist. Let's get you back to analysing your CV.</p>
  <a href="/" class="btn">Back to CVio</a>
</body>
</html>
